name: Supabase Keep Alive

on:
  schedule:
    - cron: '0 9 * * 1,4'  # Every Monday and Thursday at 09:00 UTC (every ~3 days)
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase (query approved benches)
        run: |
          response=$(curl -sf \
            -H "apikey: ${{ secrets.VITE_SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.VITE_SUPABASE_ANON_KEY }}" \
            "${{ secrets.VITE_SUPABASE_URL }}/rest/v1/benches?select=id&status=eq.approved&limit=1")
          echo "Ping successful: $response"
