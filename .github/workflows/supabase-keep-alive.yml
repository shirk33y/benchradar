name: Supabase Keep Alive

on:
  schedule:
    - cron: '0 9,21 * * *'  # Every day at 09:00 and 21:00 UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Insert row into keep_alive
        id: insert
        run: |
          random_name=$(uuidgen)
          payload=$(printf '{"name":"%s"}' "$random_name")
          echo "Payload: $payload"
          response=$(curl -s -X POST \
            -H "apikey: ${{ secrets.VITE_SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.VITE_SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=representation" \
            -d "$payload" \
            "${{ secrets.VITE_SUPABASE_URL }}/rest/v1/keep_alive")
          echo "Inserted: $response"
          inserted_id=$(echo "$response" | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)
          if [ -z "$inserted_id" ]; then
            echo "Insert failed, no id returned"
            exit 1
          fi
          echo "inserted_id=$inserted_id" >> $GITHUB_OUTPUT

      - name: Delete row from keep_alive
        run: |
          curl -sf -X DELETE \
            -H "apikey: ${{ secrets.VITE_SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.VITE_SUPABASE_ANON_KEY }}" \
            "${{ secrets.VITE_SUPABASE_URL }}/rest/v1/keep_alive?id=eq.${{ steps.insert.outputs.inserted_id }}"
          echo "Deleted row ${{ steps.insert.outputs.inserted_id }}"
